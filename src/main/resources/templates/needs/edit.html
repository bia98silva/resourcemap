<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Editar Necessidade - ResourceMap</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{layout/main :: layout(~{::main})}">
  <main>
    <div class="container-fluid py-4">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h1><i class="fas fa-edit me-2"></i>Editar Necessidade</h1>
        <a href="/needs" class="btn btn-secondary">
          <i class="fas fa-arrow-left me-2"></i>Voltar
        </a>
      </div>

      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="card">
            <div class="card-body">
              <form th:action="@{/needs/{id}/edit(id=${need.id})}" method="post">

                <div class="mb-3">
                  <label for="title" class="form-label">Título *</label>
                  <input type="text" class="form-control" id="title" name="title" th:value="${need.title}" required>
                </div>

                <div class="mb-3">
                  <label for="description" class="form-label">Descrição</label>
                  <textarea class="form-control" id="description" name="description" rows="3" th:text="${need.description}"></textarea>
                </div>

                <div class="row">
                  <div class="col-md-6">
                    <div class="mb-3">
                      <label for="category" class="form-label">Categoria *</label>
                      <select class="form-select" id="category" name="category" required>
                        <option value="">Selecionar...</option>
                        <option value="FOOD" th:selected="${need.category?.name() == 'FOOD'}">FOOD</option>
                        <option value="WATER" th:selected="${need.category?.name() == 'WATER'}">WATER</option>
                        <option value="CLOTHING" th:selected="${need.category?.name() == 'CLOTHING'}">CLOTHING</option>
                        <option value="MEDICAL" th:selected="${need.category?.name() == 'MEDICAL'}">MEDICAL</option>
                        <option value="SHELTER" th:selected="${need.category?.name() == 'SHELTER'}">SHELTER</option>
                        <option value="EDUCATION" th:selected="${need.category?.name() == 'EDUCATION'}">EDUCATION</option>
                        <option value="TRANSPORTATION" th:selected="${need.category?.name() == 'TRANSPORTATION'}">TRANSPORTATION</option>
                        <option value="OTHER" th:selected="${need.category?.name() == 'OTHER'}">OTHER</option>
                      </select>
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="mb-3">
                      <label for="priority" class="form-label">Prioridade *</label>
                      <select class="form-select" id="priority" name="priority" required>
                        <option value="">Selecionar...</option>
                        <option value="LOW" th:selected="${need.priority?.name() == 'LOW'}">LOW</option>
                        <option value="MEDIUM" th:selected="${need.priority?.name() == 'MEDIUM'}">MEDIUM</option>
                        <option value="HIGH" th:selected="${need.priority?.name() == 'HIGH'}">HIGH</option>
                        <option value="CRITICAL" th:selected="${need.priority?.name() == 'CRITICAL'}">CRITICAL</option>
                      </select>
                    </div>
                  </div>
                </div>

                <div class="row">
                  <div class="col-md-6">
                    <div class="mb-3">
                      <label for="location" class="form-label">Localização *</label>
                      <input type="text" class="form-control" id="location" name="location" th:value="${need.location}" required>
                    </div>
                  </div>
                  <div class="col-md-6">
                    <div class="mb-3">
                      <label for="quantity" class="form-label">Quantidade *</label>
                      <input type="number" class="form-control" id="quantity" name="quantity" th:value="${need.quantity}" min="1" required>
                    </div>
                  </div>
                </div>

                <div class="mb-3">
                  <label for="unit" class="form-label">Unidade</label>
                  <input type="text" class="form-control" id="unit" name="unit" th:value="${need.unit}">
                </div>

                <div class="d-flex gap-2">
                  <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save me-2"></i>Salvar Alterações
                  </button>
                  <a href="/needs" class="btn btn-secondary">Cancelar</a>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
